<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c63ff;
      --primary-dark: #574fd6;
      --high: #e74c3c;
      --medium: #f39c12;
      --low: #27ae60;
      --bg: #f0f2f5;
      --card: #fff;
      --border: #e8e8e8;
      --text: #333;
      --text-light: #888;
      --text-muted: #aaa;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    .container {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 28px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
    .subtitle { color: var(--text-light); font-size: 0.88rem; margin-top: 4px; }

    .header-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

    .icon-btn {
      background: none;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-light);
      transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* Search */
    .search-row {
      position: relative;
      margin-bottom: 16px;
    }
    .search-row input {
      width: 100%;
      padding: 10px 16px 10px 36px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--primary); }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    /* Add form */
    .add-form {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .add-form:focus-within { border-color: var(--primary); }

    .add-main-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .add-main-row input {
      flex: 1;
      padding: 8px 12px;
      border: none;
      outline: none;
      font-size: 0.95rem;
      background: transparent;
    }

    .expand-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .expand-btn:hover { background: #f5f5f5; color: var(--text); }

    .add-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: var(--primary-dark); }
    .add-btn:active { transform: scale(0.96); }

    .add-options {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .add-options.hidden { display: none; }

    .option-group label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .option-group select,
    .option-group input[type="date"],
    .option-group input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    .option-group select:focus,
    .option-group input:focus { border-color: var(--primary); }

    /* Filter bar */
    .filter-bar {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: #fff;
      color: #666;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .sort-select {
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 20px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      background: #fff;
      margin-left: auto;
    }

    /* Category chips */
    .category-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cat-chip {
      padding: 4px 12px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      background: #fff;
      font-size: 0.78rem;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }
    .cat-chip.active {
      border-color: var(--primary);
      background: #f0eeff;
      color: var(--primary);
    }

    /* Bulk actions */
    .bulk-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 12px;
      background: #f8f7ff;
      border-radius: 10px;
      align-items: center;
    }
    .bulk-bar span {
      font-size: 0.82rem;
      color: var(--text-light);
      margin-right: auto;
    }
    .bulk-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }
    .bulk-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* Todo list */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: #fafafa;
      border: 1px solid #ebebeb;
      border-radius: 10px;
      border-left: 4px solid transparent;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: slideIn 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .todo-item.dragging { opacity: 0.4; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .todo-item.drag-over { border-color: var(--primary); background: #f5f3ff; }

    .todo-item.priority-high { border-left-color: var(--high); }
    .todo-item.priority-medium { border-left-color: var(--medium); }
    .todo-item.priority-low { border-left-color: var(--low); }

    .todo-item.done { opacity: 0.55; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .drag-handle {
      color: var(--text-muted);
      font-size: 1rem;
      cursor: grab;
      flex-shrink: 0;
      margin-top: 2px;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .todo-check {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .todo-body { flex: 1; min-width: 0; }

    .todo-text {
      display: block;
      font-size: 0.93rem;
      color: var(--text);
      word-break: break-word;
      outline: none;
      background: transparent;
      border: none;
      cursor: text;
      width: 100%;
      line-height: 1.45;
    }
    .todo-text:focus { background: #f0eeff; border-radius: 4px; padding: 1px 4px; }

    .todo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
      align-items: center;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #eee;
      color: #666;
    }
    .tag.category { background: #e8e3ff; color: var(--primary); }

    .due-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .due-badge.overdue { background: #fde8e8; color: var(--high); }
    .due-badge.today   { background: #fff3cd; color: #e67e22; }
    .due-badge.tomorrow{ background: #fff8e1; color: var(--medium); }
    .due-badge.future  { background: #e8f5e9; color: var(--low); }

    .priority-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .priority-badge.high   { background: #fde8e8; color: var(--high); }
    .priority-badge.low    { background: #e8f5e9; color: var(--low); }

    .recurring-badge {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .delete-btn:hover { color: var(--high); background: #ffeaea; }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.92rem;
      padding: 32px 0;
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .footer-actions { display: flex; gap: 8px; align-items: center; }

    .text-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.2s;
    }
    .text-btn:hover { color: var(--primary); }
    .text-btn.danger:hover { color: var(--high); }

    /* Stats Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 1.3rem; color: #1a1a2e; }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .close-btn:hover { background: #f5f5f5; color: var(--text); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #f8f7ff;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .stat-card .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
    .stat-card .stat-label { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; }

    .chart-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 110px;
      margin-bottom: 6px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 4px;
    }

    .bar {
      width: 100%;
      background: var(--primary);
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      opacity: 0.75;
    }

    .bar-label { font-size: 0.65rem; color: var(--text-muted); }
    .bar-num   { font-size: 0.65rem; color: var(--text-light); font-weight: 600; }

    .priority-breakdown { margin-top: 20px; }

    .pb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .pb-label { font-size: 0.82rem; color: var(--text); width: 40px; }
    .pb-bar-bg {
      flex: 1;
      height: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
    }
    .pb-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .pb-bar-fill.high   { background: var(--high); }
    .pb-bar-fill.medium { background: var(--medium); }
    .pb-bar-fill.low    { background: var(--low); }
    .pb-count { font-size: 0.78rem; color: var(--text-muted); width: 24px; text-align: right; }

    /* Undo Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d2d2d;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      animation: toastIn 0.3s ease;
      max-width: 360px;
      width: calc(100% - 32px);
    }
    .toast.hidden { display: none; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .toast-msg { flex: 1; }

    .undo-btn {
      background: none;
      border: none;
      color: #aad4ff;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 2px 4px;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .undo-btn:hover { color: #fff; }

    .toast-close {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px;
      transition: color 0.2s;
    }
    .toast-close:hover { color: #fff; }

    @media (max-width: 480px) {
      .container { padding: 20px 16px; }
      h1 { font-size: 1.5rem; }
      .add-options { grid-template-columns: 1fr; }
      .header-actions { gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div>
        <h1>✅ To-Do</h1>
        <p class="subtitle" id="subtitle">할 일을 추가해보세요</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="showStatsModal()" title="통계">📊</button>
        <button class="icon-btn" onclick="exportData()" title="JSON 내보내기">⬆️</button>
        <label class="icon-btn" title="JSON 가져오기" style="cursor:pointer">
          ⬇️<input type="file" accept=".json" onchange="importData(event)" style="display:none">
        </label>
      </div>
    </div>

    <!-- Search -->
    <div class="search-row">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="할 일, 카테고리, 태그 검색..."
        oninput="onSearch(this.value)"
        onkeydown="if(event.key==='Escape'){this.value='';onSearch('');}">
    </div>

    <!-- Add form -->
    <div class="add-form">
      <div class="add-main-row">
        <input type="text" id="todoInput" placeholder="새 할 일 입력..." maxlength="200">
        <button class="expand-btn" onclick="toggleOptions()" id="expandBtn" title="옵션 펼치기">⚙️</button>
        <button class="add-btn" onclick="addTodo()" title="추가">＋</button>
      </div>
      <div class="add-options hidden" id="addOptions">
        <div class="option-group">
          <label>우선순위</label>
          <select id="optPriority">
            <option value="medium">보통</option>
            <option value="high">높음 🔴</option>
            <option value="low">낮음 🟢</option>
          </select>
        </div>
        <div class="option-group">
          <label>마감일</label>
          <input type="date" id="optDueDate">
        </div>
        <div class="option-group">
          <label>카테고리</label>
          <input type="text" id="optCategory" placeholder="업무, 개인, 쇼핑...">
        </div>
        <div class="option-group">
          <label>태그 (쉼표 구분)</label>
          <input type="text" id="optTags" placeholder="태그1, 태그2">
        </div>
        <div class="option-group" style="grid-column: 1 / -1">
          <label>반복</label>
          <select id="optRecurring">
            <option value="none">없음</option>
            <option value="daily">매일</option>
            <option value="weekly">매주</option>
            <option value="monthly">매달</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
        <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
        <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
        <select class="sort-select" onchange="setSort(this.value)">
          <option value="default">기본 순</option>
          <option value="priority">우선순위</option>
          <option value="dueDate">마감일</option>
          <option value="name">이름순</option>
        </select>
      </div>
      <div class="category-chips" id="categoryChips"></div>
    </div>

    <!-- Bulk actions -->
    <div class="bulk-bar">
      <span id="bulkInfo"></span>
      <button class="bulk-btn" onclick="markAllDone()">전체 완료</button>
      <button class="bulk-btn" onclick="markAllUndone()">전체 미완료</button>
    </div>

    <!-- Todo list -->
    <ul class="todo-list" id="todoList"
      ondragover="event.preventDefault()"
    ></ul>

    <!-- Footer -->
    <div class="footer">
      <span id="countText"></span>
      <div class="footer-actions">
        <button class="text-btn danger" onclick="clearDone()">완료 항목 삭제</button>
        <span style="color:#ddd">|</span>
        <button class="text-btn" onclick="exportText()">텍스트 내보내기</button>
      </div>
    </div>

  </div><!-- /.container -->

  <!-- Stats Modal -->
  <div class="modal-overlay hidden" id="statsModal" onclick="onOverlayClick(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>📊 통계</h2>
        <button class="close-btn" onclick="hideStatsModal()">✕</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">전체</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statDone">0</div>
          <div class="stat-label">완료</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statRate">0%</div>
          <div class="stat-label">완료율</div>
        </div>
      </div>
      <div class="chart-title">최근 7일 완료 현황</div>
      <div class="bar-chart" id="barChart"></div>
      <div class="priority-breakdown">
        <div class="chart-title">우선순위별 미완료</div>
        <div class="pb-row">
          <div class="pb-label">높음</div>
          <div class="pb-bar-bg"><div class="pb-bar-fill high" id="pbHigh" style="width:0%"></div></div>
          <div class="pb-count" id="pbHighNum">0</div>
        </div>
        <div class="pb-row">
          <div class="pb-label">보통</div>
          <div class="pb-bar-bg"><div class="pb-bar-fill medium" id="pbMedium" style="width:0%"></div></div>
          <div class="pb-count" id="pbMediumNum">0</div>
        </div>
        <div class="pb-row">
          <div class="pb-label">낮음</div>
          <div class="pb-bar-bg"><div class="pb-bar-fill low" id="pbLow" style="width:0%"></div></div>
          <div class="pb-count" id="pbLowNum">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Undo Toast -->
  <div class="toast hidden" id="toast">
    <span class="toast-msg" id="toastMsg"></span>
    <button class="undo-btn" onclick="undoDelete()">되돌리기</button>
    <button class="toast-close" onclick="hideToast()">✕</button>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let searchQuery = '';
    let sortBy = 'default';
    let selectedCategory = '';
    let optionsVisible = false;
    let undoStack = [];
    let toastTimer = null;
    let dragSrcId = null;

    // Migrate old todos to new schema
    todos = todos.map(t => ({
      priority: 'medium',
      dueDate: null,
      category: '',
      tags: [],
      createdAt: t.id || Date.now(),
      completedAt: null,
      recurring: 'none',
      ...t,
    }));

    // ── Init ──────────────────────────────────────────────
    const input = document.getElementById('todoInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    // ── Persistence ───────────────────────────────────────
    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    // ── CRUD ──────────────────────────────────────────────
    function addTodo() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const tagsRaw = document.getElementById('optTags').value;
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

      const todo = {
        id: Date.now(),
        text,
        done: false,
        priority: document.getElementById('optPriority').value,
        dueDate: document.getElementById('optDueDate').value || null,
        category: document.getElementById('optCategory').value.trim(),
        tags,
        createdAt: Date.now(),
        completedAt: null,
        recurring: document.getElementById('optRecurring').value,
      };

      todos.unshift(todo);
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggleTodo(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      t.done = !t.done;
      t.completedAt = t.done ? Date.now() : null;

      if (t.done && t.recurring !== 'none') {
        todos.unshift(createNextRecurring(t));
      }
      save();
      render();
    }

    function createNextRecurring(t) {
      const base = t.dueDate ? new Date(t.dueDate + 'T00:00:00') : new Date();
      if (t.recurring === 'daily')   base.setDate(base.getDate() + 1);
      if (t.recurring === 'weekly')  base.setDate(base.getDate() + 7);
      if (t.recurring === 'monthly') base.setMonth(base.getMonth() + 1);
      return {
        id: Date.now() + Math.random(),
        text: t.text,
        done: false,
        priority: t.priority,
        dueDate: base.toISOString().split('T')[0],
        category: t.category,
        tags: [...(t.tags || [])],
        createdAt: Date.now(),
        completedAt: null,
        recurring: t.recurring,
      };
    }

    function deleteTodo(id) {
      const idx = todos.findIndex(t => t.id === id);
      if (idx === -1) return;
      const [deleted] = todos.splice(idx, 1);
      undoStack.push({ todo: deleted, idx });
      save();
      render();
      const label = deleted.text.length > 24 ? deleted.text.slice(0, 24) + '…' : deleted.text;
      showToast(`"${label}" 삭제됨`);
    }

    function undoDelete() {
      if (!undoStack.length) return;
      const { todo, idx } = undoStack.pop();
      todos.splice(Math.min(idx, todos.length), 0, todo);
      save();
      render();
      hideToast();
    }

    function editTodo(id, newText) {
      const t = todos.find(t => t.id === id);
      if (t && newText.trim()) t.text = newText.trim();
      save();
    }

    function clearDone() {
      if (!todos.some(t => t.done)) return;
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function markAllDone() {
      getFiltered().forEach(t => {
        if (!t.done) { t.done = true; t.completedAt = Date.now(); }
      });
      save(); render();
    }

    function markAllUndone() {
      getFiltered().forEach(t => { t.done = false; t.completedAt = null; });
      save(); render();
    }

    // ── Filters & Sort ────────────────────────────────────
    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setSort(val) { sortBy = val; render(); }
    function onSearch(val) { searchQuery = val.toLowerCase(); render(); }

    function setCategory(cat) {
      selectedCategory = (selectedCategory === cat) ? '' : cat;
      render();
    }

    function getFiltered() {
      let list = [...todos];

      if (filter === 'done')   list = list.filter(t => t.done);
      if (filter === 'active') list = list.filter(t => !t.done);

      if (selectedCategory) list = list.filter(t => t.category === selectedCategory);

      if (searchQuery) {
        list = list.filter(t =>
          t.text.toLowerCase().includes(searchQuery) ||
          (t.category || '').toLowerCase().includes(searchQuery) ||
          (t.tags || []).some(tag => tag.toLowerCase().includes(searchQuery))
        );
      }

      if (sortBy === 'priority') {
        const order = { high: 0, medium: 1, low: 2 };
        list.sort((a, b) => (order[a.priority] ?? 1) - (order[b.priority] ?? 1));
      } else if (sortBy === 'dueDate') {
        list.sort((a, b) => {
          if (!a.dueDate && !b.dueDate) return 0;
          if (!a.dueDate) return 1;
          if (!b.dueDate) return -1;
          return a.dueDate.localeCompare(b.dueDate);
        });
      } else if (sortBy === 'name') {
        list.sort((a, b) => a.text.localeCompare(b.text, 'ko'));
      }

      return list;
    }

    function getCategories() {
      return [...new Set(todos.map(t => t.category).filter(Boolean))];
    }

    // ── Render ────────────────────────────────────────────
    function render() {
      renderCategoryChips();
      renderList();
      renderFooter();
    }

    function renderCategoryChips() {
      const cats = getCategories();
      const el = document.getElementById('categoryChips');
      el.innerHTML = cats.map(cat => `
        <button class="cat-chip ${selectedCategory === cat ? 'active' : ''}"
          onclick="setCategory('${escapeAttr(cat)}')">${escapeHtml(cat)}</button>
      `).join('');
    }

    function renderList() {
      const list = document.getElementById('todoList');
      const filtered = getFiltered();
      const total = todos.length;

      document.getElementById('subtitle').textContent =
        total ? `총 ${total}개의 할 일` : '할 일을 추가해보세요';
      document.getElementById('bulkInfo').textContent =
        filtered.length ? `${filtered.length}개 표시 중` : '';

      if (!filtered.length) {
        list.innerHTML = `<li class="empty">${
          searchQuery         ? '검색 결과가 없습니다 🔍' :
          filter === 'done'   ? '완료된 항목이 없습니다' :
          filter === 'active' ? '미완료 항목이 없습니다' :
                                '할 일을 추가해보세요 🎉'
        }</li>`;
        return;
      }

      list.innerHTML = filtered.map(t => {
        const meta = [
          t.priority !== 'medium' ? `<span class="priority-badge ${t.priority}">${t.priority === 'high' ? '🔴 높음' : '🟢 낮음'}</span>` : '',
          getDueBadge(t.dueDate),
          t.category ? `<span class="tag category">${escapeHtml(t.category)}</span>` : '',
          (t.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join(''),
          t.recurring !== 'none' ? `<span class="recurring-badge">${{daily:'🔄 매일',weekly:'🔄 매주',monthly:'🔄 매달'}[t.recurring]}</span>` : '',
        ].filter(Boolean).join('');

        return `
          <li class="todo-item ${t.done ? 'done' : ''} priority-${t.priority}"
              data-id="${t.id}"
              draggable="true"
              ondragstart="onDragStart(event, ${t.id})"
              ondragover="onDragOver(event)"
              ondrop="onDrop(event, ${t.id})"
              ondragend="onDragEnd(event)">
            <span class="drag-handle" title="드래그로 순서 변경">⠿</span>
            <input type="checkbox" class="todo-check" ${t.done ? 'checked' : ''}
              onchange="toggleTodo(${t.id})">
            <div class="todo-body">
              <span class="todo-text" contenteditable="true"
                onblur="editTodo(${t.id}, this.textContent)"
                onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
              >${escapeHtml(t.text)}</span>
              ${meta ? `<div class="todo-meta">${meta}</div>` : ''}
            </div>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="삭제">✕</button>
          </li>`;
      }).join('');

      // Attach touch swipe handlers
      list.querySelectorAll('.todo-item').forEach(attachSwipeHandler);
    }

    function renderFooter() {
      const done = todos.filter(t => t.done).length;
      const total = todos.length;
      document.getElementById('countText').textContent =
        total ? `${done} / ${total} 완료` : '';
    }

    // ── Badge helpers ─────────────────────────────────────
    function getDueBadge(dueDate) {
      if (!dueDate) return '';
      const today = new Date(); today.setHours(0,0,0,0);
      const due = new Date(dueDate + 'T00:00:00');
      const diff = Math.round((due - today) / 86400000);
      if (diff < 0)  return `<span class="due-badge overdue">⚠️ ${Math.abs(diff)}일 지남</span>`;
      if (diff === 0) return `<span class="due-badge today">오늘 마감</span>`;
      if (diff === 1) return `<span class="due-badge tomorrow">내일 마감</span>`;
      return `<span class="due-badge future">📅 ${dueDate}</span>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escapeAttr(str) {
      return String(str).replace(/'/g, "\\'");
    }

    // ── Toggle add options ────────────────────────────────
    function toggleOptions() {
      optionsVisible = !optionsVisible;
      document.getElementById('addOptions').classList.toggle('hidden', !optionsVisible);
      document.getElementById('expandBtn').textContent = optionsVisible ? '▲' : '⚙️';
    }

    // ── Drag & Drop ───────────────────────────────────────
    function onDragStart(e, id) {
      dragSrcId = id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      e.currentTarget.classList.add('drag-over');
    }

    function onDrop(e, targetId) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!dragSrcId || dragSrcId === targetId) return;

      // Reorder in the original todos array
      const srcIdx = todos.findIndex(t => t.id === dragSrcId);
      const tgtIdx = todos.findIndex(t => t.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;

      const [removed] = todos.splice(srcIdx, 1);
      todos.splice(tgtIdx, 0, removed);
      save();
      render();
    }

    function onDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      dragSrcId = null;
    }

    // ── Touch Swipe to Delete ─────────────────────────────
    function attachSwipeHandler(el) {
      let startX = 0, currentX = 0, moved = false;

      el.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        moved = false;
        el.style.transition = '';
      }, { passive: true });

      el.addEventListener('touchmove', e => {
        currentX = e.touches[0].clientX;
        const dx = startX - currentX;
        if (dx > 8) {
          moved = true;
          el.style.transform = `translateX(-${Math.min(dx, 100)}px)`;
        }
      }, { passive: true });

      el.addEventListener('touchend', () => {
        const dx = startX - currentX;
        el.style.transition = 'transform 0.2s, opacity 0.2s';
        if (moved && dx > 90) {
          el.style.transform = 'translateX(-110%)';
          el.style.opacity = '0';
          setTimeout(() => deleteTodo(parseInt(el.dataset.id)), 200);
        } else {
          el.style.transform = '';
        }
        moved = false;
      }, { passive: true });
    }

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg) {
      document.getElementById('toastMsg').textContent = msg;
      const toast = document.getElementById('toast');
      toast.classList.remove('hidden');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, 5000);
    }

    function hideToast() {
      document.getElementById('toast').classList.add('hidden');
      if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
    }

    // ── Stats Modal ───────────────────────────────────────
    function showStatsModal() {
      renderStats();
      document.getElementById('statsModal').classList.remove('hidden');
    }

    function hideStatsModal() {
      document.getElementById('statsModal').classList.add('hidden');
    }

    function onOverlayClick(e) {
      if (e.target.id === 'statsModal') hideStatsModal();
    }

    function renderStats() {
      const total = todos.length;
      const done  = todos.filter(t => t.done).length;
      const rate  = total ? Math.round(done / total * 100) : 0;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statDone').textContent  = done;
      document.getElementById('statRate').textContent  = rate + '%';

      // Bar chart: last 7 days
      const today = new Date();
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(today);
        d.setDate(today.getDate() - (6 - i));
        const dateStr = d.toISOString().split('T')[0];
        const count = todos.filter(t =>
          t.completedAt &&
          new Date(t.completedAt).toISOString().split('T')[0] === dateStr
        ).length;
        return { d, count };
      });

      const maxC = Math.max(...days.map(d => d.count), 1);
      document.getElementById('barChart').innerHTML = days.map(({ d, count }) => {
        const h = count ? Math.max(count / maxC * 90, 4) : 0;
        const label = `${d.getMonth()+1}/${d.getDate()}`;
        return `
          <div class="bar-col">
            <div class="bar-num">${count || ''}</div>
            <div class="bar" style="height:${h}px"></div>
            <div class="bar-label">${label}</div>
          </div>`;
      }).join('');

      // Priority breakdown
      const active = todos.filter(t => !t.done);
      const h = active.filter(t => t.priority === 'high').length;
      const m = active.filter(t => t.priority === 'medium').length;
      const l = active.filter(t => t.priority === 'low').length;
      const maxP = Math.max(h, m, l, 1);

      document.getElementById('pbHigh').style.width   = (h / maxP * 100) + '%';
      document.getElementById('pbMedium').style.width = (m / maxP * 100) + '%';
      document.getElementById('pbLow').style.width    = (l / maxP * 100) + '%';
      document.getElementById('pbHighNum').textContent   = h;
      document.getElementById('pbMediumNum').textContent = m;
      document.getElementById('pbLowNum').textContent    = l;
    }

    // ── Export / Import ───────────────────────────────────
    function exportData() {
      const blob = new Blob([JSON.stringify(todos, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `todos_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error('Not an array');
          todos = data.map(t => ({
            priority: 'medium', dueDate: null, category: '',
            tags: [], createdAt: t.id || Date.now(),
            completedAt: null, recurring: 'none', ...t,
          }));
          save();
          render();
          showToast(`${todos.length}개 항목을 가져왔습니다`);
        } catch {
          alert('올바른 JSON 파일이 아닙니다.');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function exportText() {
      const lines = todos.map((t, i) => {
        const status = t.done ? '[완료]' : '[  ]';
        const due = t.dueDate ? ` | 마감: ${t.dueDate}` : '';
        const cat = t.category ? ` | 카테고리: ${t.category}` : '';
        return `${i+1}. ${status} ${t.text}${due}${cat}`;
      });
      const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `todos_${new Date().toISOString().split('T')[0]}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Boot ──────────────────────────────────────────────
    render();
  </script>
</body>
</html>
